name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
      - name: Ruff check
        run: uvx ruff check .

  package:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: uv build
      - name: twine check
        run: uvx --with twine twine check dist/*
      - name: Install built wheel into a fresh venv and smoke test the CLI
        run: |
          uv venv /tmp/evergen-ci-smoke-venv
          uv pip install --python /tmp/evergen-ci-smoke-venv/bin/python dist/*.whl
          /tmp/evergen-ci-smoke-venv/bin/evergen --help
